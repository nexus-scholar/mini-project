<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-6" x-data="app()" x-init="loadUsers()">

  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-blue-700">User Management System</h1>
      <div class="flex items-center gap-2">
        <button @click="createDemo()" class="btn-secondary text-sm">Populate demo users</button>
        <span class="text-gray-500 text-sm" x-show="total !== null">Total: <strong x-text="total"></strong></span>
      </div>
    </div>

    <!-- Notification -->
    <div x-show="msg.text" x-transition
         :class="msg.type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'"
         class="mb-4 px-4 py-2 rounded border text-sm font-medium" x-text="msg.text"></div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow p-5 mb-6 border border-gray-200">
      <h2 class="font-semibold text-gray-700 mb-4" x-text="editId ? 'Edit User' : 'Add New User'"></h2>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">First Name</label>
          <input x-model="form.first_name"  placeholder="First Name"  class="input" :class="errors.first_name ? 'border-red-500 ring-red-100' : ''" aria-label="First name" />
          <p x-show="errors.first_name" x-text="errors.first_name" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Last Name</label>
          <input x-model="form.last_name"   placeholder="Last Name"   class="input" :class="errors.last_name ? 'border-red-500 ring-red-100' : ''" aria-label="Last name" />
          <p x-show="errors.last_name" x-text="errors.last_name" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Birth Date</label>
          <input x-model="form.birth_date"  placeholder="Birth Date (YYYY-MM-DD)" type="date" class="input" :class="errors.birth_date ? 'border-red-500 ring-red-100' : ''" aria-label="Birth date" />
          <p x-show="errors.birth_date" x-text="errors.birth_date" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Birth Place</label>
          <input x-model="form.birth_place" placeholder="Birth Place" class="input" :class="errors.birth_place ? 'border-red-500 ring-red-100' : ''" aria-label="Birth place" />
          <p x-show="errors.birth_place" x-text="errors.birth_place" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div class="col-span-2">
          <label class="block text-xs font-medium text-gray-600 mb-1">Phone</label>
          <input x-model="form.phone"       placeholder="Phone Number" class="input" :class="errors.phone ? 'border-red-500 ring-red-100' : ''" aria-label="Phone number" />
          <p class="text-xs text-gray-500 mt-1">Format: +123456789 (7-15 digits)</p>
          <p x-show="errors.phone" x-text="errors.phone" class="text-xs text-red-500 mt-1"></p>
        </div>
      </div>
      <div class="mt-4 flex gap-2 items-center">
        <button :disabled="loading" @click="submitForm()" class="btn-primary" x-text="editId ? 'Update User' : 'Add User'"></button>
        <button x-show="editId" @click="resetForm()" class="btn-secondary">Cancel</button>
        <div x-show="loading" class="text-gray-500 text-sm ml-2">Working...</div>
      </div>
    </div>

    <!-- Search -->
    <div class="mb-4">
      <input x-model="search" @input="loadUsers()" placeholder="Search by any field..."
             class="input w-full" />
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-blue-50 text-blue-700 uppercase text-xs">
          <tr>
            <th class="px-4 py-3">First Name</th>
            <th class="px-4 py-3">Last Name</th>
            <th class="px-4 py-3">Birth Date</th>
            <th class="px-4 py-3">Birth Place</th>
            <th class="px-4 py-3">Phone</th>
            <th class="px-4 py-3 text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="u in userList" :key="u._id">
            <tr class="border-t hover:bg-gray-50">
              <td class="px-4 py-2" x-text="u.first_name"></td>
              <td class="px-4 py-2" x-text="u.last_name"></td>
              <td class="px-4 py-2" x-text="u.birth_date"></td>
              <td class="px-4 py-2" x-text="u.birth_place"></td>
              <td class="px-4 py-2" x-text="u.phone"></td>
              <td class="px-4 py-2 text-center space-x-2">
                <button @click="editUser(u)" class="text-blue-600 hover:underline text-xs">Edit</button>
                <button @click="deleteUser(u._id)" class="text-red-500 hover:underline text-xs">Delete</button>
              </td>
            </tr>
          </template>
          <tr x-show="userList.length === 0">
            <td colspan="6" class="text-center text-gray-400 py-6">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <style>
    /* Inputs: subtle border, smoother focus */
    .input { @apply border border-gray-300 rounded-lg px-3 py-2 w-full text-sm transition focus:outline-none; }
    .input:focus { @apply ring-2 ring-blue-200 border-blue-400; }

    /* Primary button: solid with subtle border and shadow */
    .btn-primary {
      @apply bg-blue-600 text-white px-5 py-2 rounded-lg text-sm transition transform;
      border: 1px solid rgba(37,99,235,0.9); /* Tailwind's blue-600 */
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }
    .btn-primary:hover { @apply bg-blue-700; transform: translateY(-1px); }

    /* Secondary button: light background with subtle border */
    .btn-secondary {
      @apply bg-white text-gray-700 px-5 py-2 rounded-lg text-sm transition;
      border: 1px solid #e5e7eb; /* gray-200 */
    }
    .btn-secondary:hover { @apply bg-gray-100; transform: translateY(-1px); }
  </style>

  <script>
    function app() {
      return {
        loading: false,
        total: null,
        form: {
          first_name: '',
          last_name: '',
          birth_date: '',
          birth_place: '',
          phone: ''
        },
        userList: [],
        search: '',
        editId: null,
        errors: {},
        msg: {
          text: '',
          type: ''
        },

        notify(text, type = 'success') {
          this.msg = { text, type };
          setTimeout(() => this.msg = { text: '', type: '' }, 3500);
        },

        async loadUsers() {
          this.loading = true;
          try {
            const res = await fetch(`/users?q=${encodeURIComponent(this.search)}`);
            const data = await res.json();
            this.userList = Array.isArray(data) ? data : [];
            this.total = this.userList.length;
          } catch (e) {
            this.notify('Could not load users', 'error');
          } finally {
            this.loading = false;
          }
        },

        validateForm() {
          this.errors = {};
          if (!this.form.first_name.trim()) this.errors.first_name = 'First name is required.';
          if (!this.form.last_name.trim()) this.errors.last_name = 'Last name is required.';
          if (!this.form.birth_date) this.errors.birth_date = 'Birth date is required.';
          if (!this.form.birth_place.trim()) this.errors.birth_place = 'Birth place is required.';
          if (!/^\+?[0-9]{7,15}$/.test(this.form.phone.trim())) this.errors.phone = 'Phone must be 7-15 digits, optional +.';
          return Object.keys(this.errors).length === 0;
        },

        async submitForm() {
          const ok = this.validateForm();
          if (!ok) return this.notify('Please fix the highlighted fields', 'error');
          this.loading = true;
          try {
            const method = this.editId ? 'PUT' : 'POST';
            const url    = this.editId ? `/users/${this.editId}` : '/users';
            const res    = await fetch(url, {
              method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form)
            });
            const data = await res.json();
            if (data.error) return this.notify(data.error, 'error');
            this.notify(data.success || 'Saved');
            this.resetForm();
            await this.loadUsers();
          } catch (e) {
            this.notify('Failed to save user', 'error');
          } finally {
            this.loading = false;
          }
        },

        editUser(u) {
          this.editId = u._id;
          this.form = { first_name: u.first_name, last_name: u.last_name,
                        birth_date: u.birth_date, birth_place: u.birth_place, phone: u.phone };
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        async deleteUser(id) {
          if (!confirm('Are you sure you want to delete this user?')) return;
          this.loading = true;
          try {
            const res  = await fetch(`/users/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.error) return this.notify(data.error, 'error');
            this.notify(data.success);
            await this.loadUsers();
          } catch (e) {
            this.notify('Failed to delete user', 'error');
          } finally {
            this.loading = false;
          }
        },

        async createDemo() {
          if (!confirm('Create demo users? This may add up to 3 users.')) return;
          this.loading = true;
          try {
            const res = await fetch('/demo/create');
            const data = await res.json();
            if (data.created && data.created.length) this.notify(`Created ${data.created.length} demo users`);
            if (data.skipped && data.skipped.length) console.log('Skipped:', data.skipped);
            await this.loadUsers();
          } catch (e) {
            this.notify('Failed to create demo users', 'error');
          } finally {
            this.loading = false;
          }
        },

        resetForm() {
          this.form = { first_name: '', last_name: '', birth_date: '', birth_place: '', phone: '' };
          this.editId = null;
        }
      }
    }
  </script>
</body>
</html>
